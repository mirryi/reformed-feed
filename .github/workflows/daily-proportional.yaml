name: Daily Proportional

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:
  feed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: daily-proportional
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build reformed-feed
        run: cargo build -p reformed-feed

      - name: Run feed generator
        run: cargo run -p reformed-feed -- etc/config.toml --state state.json > feed.xml

      - name: Commit to daily-proportional
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml state.json
          git diff --staged --quiet || git commit -m "Feed $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin daily-proportional
